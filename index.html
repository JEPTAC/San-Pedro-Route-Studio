<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#071f43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="San Pedro Route">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/logo-san-pedro.png">
  <link rel="icon" href="assets/logo-san-pedro.png">
  <title>San Pedro Route Studio</title>
  <style>
    :root{
      --navy:#071f43;
      --orange:#fc4c02;
      --gold:#ffc400;
      --line:#dbe8f7;
      --muted:#64738a;
      --safe-top:env(safe-area-inset-top,0px);
      --safe-bottom:env(safe-area-inset-bottom,0px);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      min-height:100%;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 10%,rgba(39,215,255,.18),transparent 32%),
        radial-gradient(circle at 86% 12%,rgba(255,196,0,.22),transparent 30%),
        linear-gradient(145deg,#071f43,#0d3978 58%,#061a38);
      color:#fff;
    }
    .wrap{
      min-height:100dvh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:calc(24px + var(--safe-top)) 18px calc(24px + var(--safe-bottom));
    }
    .card{
      width:min(560px,100%);
      border-radius:32px;
      background:rgba(255,255,255,.96);
      color:#102542;
      border:1px solid rgba(219,232,247,.96);
      box-shadow:0 30px 80px rgba(4,23,51,.34);
      padding:24px;
      text-align:center;
      backdrop-filter:blur(16px);
    }
    .logos{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:14px;
      margin-bottom:16px;
    }
    .logos img{
      max-height:62px;
      max-width:140px;
      object-fit:contain;
      filter:drop-shadow(0 8px 14px rgba(4,23,51,.14));
    }
    h1{
      margin:0 0 8px;
      color:var(--navy);
      font-size:25px;
      letter-spacing:-.04em;
    }
    p{
      margin:0 auto 18px;
      color:var(--muted);
      font-size:14px;
      line-height:1.45;
      max-width:440px;
    }
    .status{
      margin:14px 0 0;
      padding:12px;
      border-radius:18px;
      background:#f5f9ff;
      border:1px solid #dfe9f6;
      color:#2b466b;
      font-size:13px;
      line-height:1.4;
    }
    .buttons{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-top:16px;
    }
    a{
      min-height:52px;
      border-radius:18px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 14px;
      text-decoration:none;
      font-weight:900;
      color:#071f43;
      background:#edf5ff;
      border:1px solid #cfe0f4;
      font-size:14px;
    }
    a.primary{
      background:linear-gradient(135deg,#ff9537,#fc4c02);
      color:#fff;
      border-color:#fc4c02;
    }
    a.gold{
      background:linear-gradient(135deg,#ffe071,#ffc400);
      color:#071f43;
      border-color:#ffc400;
    }
    .creator{
      margin-top:18px;
      padding-top:15px;
      border-top:1px solid #e1ebf7;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      color:#65758f;
      font-size:12px;
    }
    .creator img{
      width:44px;
      height:38px;
      object-fit:contain;
    }
    .creator strong{
      color:#0b2651;
    }
    @media(max-width:520px){
      .buttons{grid-template-columns:1fr}
      .card{padding:20px;border-radius:26px}
      .logos img{max-width:110px;max-height:54px}
      h1{font-size:22px}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="logos">
        <img src="assets/logo-alcaldia.png" alt="Alcaldía de San Pedro">
        <img src="assets/logo-san-pedro.png" alt="San Pedro">
      </div>
      <h1>San Pedro Route Studio</h1>
      <p>Proyecto dual para GitHub Pages: una versión completa para computador y una versión móvil estilo Google Maps para iOS y Android.</p>

      <div class="buttons">
        <a class="primary" href="desktop.html" onclick="setView('desktop')">Abrir versión PC</a>
        <a class="gold" href="mobile.html" onclick="setView('mobile')">Abrir versión móvil</a>
      </div>

      <div class="status" id="status">Detectando dispositivo...</div>

      <div class="creator">
        <img src="assets/logo-jept.png" alt="JEPT">
        <span><strong>Creador y desarrollador:</strong> Juan E. Pérez</span>
      </div>
    </section>
  </main>

  <script>
    function setView(view){
      try{localStorage.setItem("sprs_dual_view", view);}catch(e){}
    }

    function getRequestedView(){
      const params = new URLSearchParams(location.search);
      if(params.get("view")==="desktop" || params.get("pc")==="1") return "desktop";
      if(params.get("view")==="mobile" || params.get("mobile")==="1") return "mobile";

      try{
        const saved = localStorage.getItem("sprs_dual_view");
        if(saved==="desktop" || saved==="mobile") return saved;
      }catch(e){}

      const ua = navigator.userAgent || "";
      const mobileUA = /Android|iPhone|iPad|iPod|Mobile|Windows Phone/i.test(ua);
      const narrow = window.matchMedia && window.matchMedia("(max-width: 980px)").matches;
      const coarse = window.matchMedia && window.matchMedia("(pointer: coarse)").matches;

      return (mobileUA || (narrow && coarse)) ? "mobile" : "desktop";
    }

    const view = getRequestedView();
    const status = document.getElementById("status");
    status.innerHTML = view === "mobile"
      ? "Dispositivo móvil detectado. Abriendo versión iOS / Android..."
      : "Computador detectado. Abriendo versión PC completa...";

    setTimeout(() => {
      location.replace(view === "mobile" ? "mobile.html" : "desktop.html");
    }, 850);
  </script>
</body>
</html>
